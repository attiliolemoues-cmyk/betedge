    function getDB(sport, nbaStandings) {
      if (sport==="NBA") return nbaStandings;
      if (sport==="Rugby Top 14") return RUGBY_TOP14_STANDINGS;
      if (sport==="6 Nations")    return RUGBY_6N_STANDINGS;
      return VOLLEYBALL_STANDINGS;
    }
    function getTeam(name, db) { return db.find(t=>t.name===name)||{wins:"—",losses:"—",winPct:0.500}; }

    function injuryDelta(teamName, injuryReport) {
      return Math.max(-0.25, (injuryReport[teamName]||[]).reduce((sum,inj)=>{
        if (inj.status==="rest")                         return sum + INJURY_IMPACT.rest.delta;
        if (inj.status==="questionable")                 return sum + INJURY_IMPACT.questionable.delta;
        const key = `out_${inj.tier||"rotation"}`;
        return sum + (INJURY_IMPACT[key]||INJURY_IMPACT.out_rotation).delta;
      },0));
    }

    function computeProb(home, away, sport, nbaStandings, injuryReport={}, gameFlags={}, intWeekActive=false) {
      const db = getDB(sport, nbaStandings);
      const h  = getTeam(home, db), a = getTeam(away, db);
      let hS = sport==="NBA" ? netRatingToStrength(h.netRating||0) : h.winPct;
      let aS = sport==="NBA" ? netRatingToStrength(a.netRating||0) : a.winPct;
      if(sport==="NBA"){
        hS += injuryDelta(home, injuryReport);
        aS += injuryDelta(away, injuryReport);
        if(gameFlags.homeB2B) hS -= 0.05;
        if(gameFlags.awayB2B) aS -= 0.05;
      }
      const hIntD = (sport!=="NBA"&&intWeekActive&&sport!=="6 Nations") ? INT_WEEK_DELTA*(h.intNatPct||0) : 0;
      const aIntD = (sport!=="NBA"&&intWeekActive&&sport!=="6 Nations") ? INT_WEEK_DELTA*(a.intNatPct||0) : 0;
      hS += hIntD; aS += aIntD;
      hS = Math.max(0.05,Math.min(0.95,hS));
      aS = Math.max(0.05,Math.min(0.95,aS));
      const homeAdv = sport==="NBA" ? 0.035 : 0.05;
      const raw  = (hS+homeAdv)/((hS+homeAdv)+aS);
      const prob = 0.5+(raw-0.5)*0.75;
      return { home:Math.round(prob*1000)/10, away:Math.round((1-prob)*1000)/10, hIntDelta:hIntD, aIntDelta:aIntD };
    }
    function calcEdge(p,o)      { return p/100 - 1/o; }
    function kelly(br,p,o)      { const b=o-1,pp=p/100; return Math.max(0,(b*pp-(1-pp))/b)*br; }
    function bestOdds(obj)      { const e=Object.entries(obj).filter(([,v])=>v>0); return e.length?e.reduce((b,c)=>c[1]>b[1]?c:b):null; }

    // ── NBA HOOK ──────────────────────────────────────────────────────────────
    function useNBAData() {
      const [standings,  setStandings]  = useState([]);
      const [games,      setGames]      = useState([]);
      const [injuries,   setInjuries]   = useState({});
      const [loading,    setLoading]    = useState(true);
      const [error,      setError]      = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:2000,
              tools:[{type:"web_search_20250305",name:"web_search"}],
              system:`Réponds UNIQUEMENT avec un JSON valide sans markdown.
Structure exacte :
{"standings":[{"name":"","wins":0,"losses":0,"winPct":0.000,"conf":"EAST","netRating":0.0,"offRating":0.0,"defRating":0.0}],"upcoming_games":[{"home":"","away":"","date":"DD Mon","homeB2B":false,"awayB2B":false,"win_prob_home":50,"win_prob_away":50}],"injuries":{"Team":[{"player":"","status":"out|questionable|rest","tier":"star|allstar|rotation","reason":""}]}}
- standings : 29 équipes NBA triées par netRating décroissant, saison en cours
- netRating=offRating-defRating (points/100 possessions)
- homeB2B/awayB2B : true si l'équipe joue son 2e match en 2 jours
- injuries : joueurs absents/incertains pour les matchs à venir uniquement`,
              messages:[{role:"user",content:"Utilise web_search pour: 1) classements NBA avec Net Rating saison en cours 2) 8 prochains matchs avec back-to-back flags 3) injury reports officiels du jour. JSON uniquement."}]
            })
          });
          const data = await res.json();
          const txt  = data.content?.find(b=>b.type==="text");
          if (!txt) throw new Error("no text");
          const raw    = txt.text.trim().replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
          const parsed = JSON.parse(raw);
          setStandings(parsed.standings.map(t=>({name:t.name,wins:+t.wins||0,losses:+t.losses||0,winPct:+t.winPct||0,conf:t.conf||"EAST",netRating:+t.netRating||0,offRating:+t.offRating||0,defRating:+t.defRating||0})));
          setGames(parsed.upcoming_games.map(g=>({home:g.home,away:g.away,date:g.date,league:"NBA",homeB2B:!!g.homeB2B,awayB2B:!!g.awayB2B,apiProb:g.win_prob_home?{home:+g.win_prob_home,away:+g.win_prob_away}:null})));
          setInjuries(parsed.injuries||{});
          setLastUpdate(new Date());
        } catch(e) {
          setError(e.message);
          setStandings(prev => prev.length ? prev : NBA_FALLBACK_STANDINGS);
          setGames([]);
          setInjuries({});
          setLastUpdate(new Date());
        } finally { setLoading(false); }
      },[]);

      useEffect(()=>{
        fetchData();
        const t = setInterval(fetchData, 15*60*1000);
        return ()=>clearInterval(t);
      },[fetchData]);

      return { standings, games, injuries, loading, error, refetch:fetchData, lastUpdate };
    }

      const fmt = d=>d?.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})||"";
      return <div style={{display:"flex",alignItems:"center",gap:5,background:error?`${C.red}15`:`${C.accent}15`,border:`1px solid ${error?C.red:C.accent}30`,borderRadius:6,padding:"3px 8px"}}>

      </div>;
    }
    function InjuryBadges({teamName, injuries}) {
      const list = injuries[teamName]||[];
      if(!list.length) return null;
      const color = inj => inj.status==="rest"?C.purple:inj.status==="questionable"?C.dim:inj.tier==="star"?C.red:inj.tier==="allstar"?C.orange:C.yellow;
      const icon  = inj => inj.status==="rest"?"😴":inj.status==="questionable"?"⚠️":"🚑";
      const delta = inj => inj.status==="rest"?INJURY_IMPACT.rest.delta:inj.status==="questionable"?INJURY_IMPACT.questionable.delta:(INJURY_IMPACT[`out_${inj.tier||"rotation"}`]||INJURY_IMPACT.out_rotation).delta;
      return <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:5}}>
        {list.map((inj,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,background:`${color(inj)}15`,border:`1px solid ${color(inj)}30`,borderRadius:4,padding:"2px 6px",fontSize:9,color:color(inj),fontWeight:600}}>

    // ── TABS ──────────────────────────────────────────────────────────────────
    const TABS = [
      { id:0, label:"Dashboard", icon:"🏠" },
      { id:1, label:"Prédictions", icon:"🔮" },
      { id:2, label:"Classements", icon:"📊" },
      { id:3, label:"Bankroll", icon:"💰" },
      { id:4, label:"Historique", icon:"📋" },

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    function Dashboard({bets, bankroll, loading, error, lastUpdate, refetch}) {
      const tp=bets.reduce((s,b)=>s+b.profit,0), ts=bets.reduce((s,b)=>s+b.stake,0);
      const wins=bets.filter(b=>b.result==="win").length;
      const roi=ts>0?((tp/ts)*100).toFixed(1):"0.0";
      const cumul=bets.reduce((acc,b)=>{acc.push((acc[acc.length-1]||0)+b.profit);return acc;},[0]);
      const last=cumul[cumul.length-1]||0;
      const W=400,H=80,minV=Math.min(...cumul,-5),maxV=Math.max(...cumul,5);
      const pts=cumul.map((v,i)=>`${(i/(cumul.length-1||1))*W},${H-((v-minV)/(maxV-minV))*H}`).join(" ");

      return <div className="fade" style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800}}>Dashboard</h2>
            <p style={{fontSize:11,color:C.dim,marginTop:2}}>Mars 2026 · 🏀 🏉 🏐</p>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
            <LiveBadge loading={loading} error={error} lastUpdate={lastUpdate} refetch={refetch}/>

          </div>
        </div>

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Stat label="Bankroll" value={`${bankroll}€`} sub="Capital"/>
          <Stat label="P&L" value={`${last>=0?"+":""}${last.toFixed(0)}€`} color={last>=0?C.accent:C.red} sub="Net"/>
          <Stat label="ROI" value={`${roi}%`} color={parseFloat(roi)>=0?C.accent:C.red} sub={`${ts}€ misés`}/>
          <Stat label="Win Rate" value={`${bets.length?((wins/bets.length)*100).toFixed(0):0}%`} color={C.yellow} sub={`${wins}/${bets.length}`}/>
        </div>

        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>Courbe P&L cumulée</div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}} preserveAspectRatio="none">
            <line x1={0} y1={H-((0-minV)/(maxV-minV))*H} x2={W} y2={H-((0-minV)/(maxV-minV))*H} stroke={C.yellow} strokeWidth="1" strokeDasharray="4,3" opacity={0.5}/>
            <polyline fill="none" stroke={last>=0?C.accent:C.red} strokeWidth="2" points={pts}/>
            {cumul.map((v,i)=><circle key={i} cx={(i/(cumul.length-1||1))*W} cy={H-((v-minV)/(maxV-minV))*H} r="2.5" fill={last>=0?C.accent:C.red}/>)}
          </svg>
        </Card>

        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:10}}>🎯 Bookmakers recommandés</div>

            {sport:"NBA",         book:"Winamax", reason:"Marge 5.2%"},
            {sport:"Rugby Top 14",book:"Winamax", reason:"Top 14 + 6 Nations"},
            {sport:"Volleyball",  book:"Unibet",  reason:"Streaming Ligue A"},
          ].map(t=><div key={t.sport} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>

        </Card>

        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:10}}>Derniers paris</div>
          {[...bets].reverse().slice(0,5).map(b=><div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>

    // ── PRÉDICTIONS ───────────────────────────────────────────────────────────
    function Predictions({bankroll, nbaStandings, nbaGames, nbaLoading, nbaError, refetch, injuries}) {

      const [minEdge,  setMinEdge]  = useState(0);

      const gamesMap = {"NBA":nbaGames,"Rugby Top 14":RUGBY_TOP14_GAMES,"6 Nations":RUGBY_6N_GAMES,"Volleyball":VOLLEYBALL_GAMES};

      function go(gk,side,bid)      { return parseFloat(bookOdds[`${gk}_${side}_${bid}`])||0; }
      function so(gk,side,bid,val)  { setBookOdds(p=>({...p,[`${gk}_${side}_${bid}`]:val})); }

      const games = (gamesMap[sport]||[]).map(g=>{

          BOOKMAKERS.forEach(b=>{opb[b.id]=go(gameKey,side,b.id);});
          const best=bestOdds(opb), be=best?calcEdge(prob,best[1])*100:null;
          const bk=(be>0&&best)?kelly(bankroll,prob,best[1]):0;
          return {side,teamName,prob,opb,best,be,bk};
        });
        const anyV=sides.some(s=>s.be!==null&&s.be>0&&s.be>=minEdge);
        const hasInj=sport==="NBA"&&((injuries[g.home]||[]).length>0||(injuries[g.away]||[]).length>0);
        return {...g,gameKey,model,sides,anyV,hasInj};
      }).filter(g=>minEdge<=0||g.anyV);

          {SPORTS.map(s=><button key={s} onClick={()=>{setSport(s);setIntWeek(false);}} style={{background:sport===s?SPORT_META[s].color:C.border,color:sport===s?C.bg:C.text,border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{SPORT_META[s].icon} {s}</button>)}
        </div>

        {/* Barre edge */}
        <div style={{display:"flex",alignItems:"center",gap:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px"}}>
          {BOOKMAKERS.map(b=><div key={b.id} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:7,height:7,borderRadius:2,background:b.color}}/>
            <span style={{fontSize:11,fontWeight:600}}>{b.name}</span>
          </div>)}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:11,color:C.muted}}>Edge ≥</span>
            <input type="range" min={-10} max={15} step={0.5} value={minEdge} onChange={e=>setMinEdge(+e.target.value)} style={{width:60}}/>
            <span style={{fontFamily:"DM Mono",fontSize:12,color:C.yellow,minWidth:36}}>{minEdge>0?"+":""}{minEdge.toFixed(1)}%</span>
          </div>
        </div>

        {games.length===0&&<Card><p style={{color:C.dim,textAlign:"center",padding:16,fontSize:12}}>Aucun match avec cet edge minimum.</p></Card>}

        {games.map((g,gi)=>{
          const db=getDB(sport,nbaStandings);
          const hT=getTeam(g.home,db), aT=getTeam(g.away,db);
          return <Card key={gi} glow={g.anyV} style={{padding:0,overflow:"hidden"}}>
            {/* Header */}
            <div style={{background:`${C.border}60`,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:5}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <Chip color={sc} small>{SPORT_META[sport]?.icon} {g.league||sport}</Chip>
                <Chip color={C.blue} small>{g.date}</Chip>
                <span style={{fontWeight:700,fontSize:13}}>{g.home} <span style={{color:C.muted}}>vs</span> {g.away}</span>
              </div>
              <div style={{display:"flex",gap:5}}>
                {g.anyV&&<Chip color={C.accent} small>⚡ VALUE</Chip>}
                {g.hasInj&&<Chip color={C.red} small>🚑</Chip>}
              </div>
            </div>

            <div style={{padding:12}}>
              {/* Stats */}
              <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
                {[{t:hT,n:g.home,d:g.model.hDelta},{t:aT,n:g.away,d:g.model.aDelta}].map(({t,n,d})=><div key={n} style={{flex:1,minWidth:140}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,flexWrap:"wrap",gap:3}}>
                    <span style={{fontSize:11,fontWeight:700}}>{n}</span>
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <span style={{fontFamily:"DM Mono",fontSize:11,color:t.winPct>=0.5?C.accent:C.red}}>{t.wins}V–{t.losses}D</span>
                      {d!==0&&<span style={{fontFamily:"DM Mono",fontSize:10,color:C.red}}>({(d*100).toFixed(0)}%)</span>}
                    </div>
                  </div>
                  <div style={{background:C.border,borderRadius:3,height:3}}>
                    <div style={{width:`${t.winPct*100}%`,background:t.winPct>=0.5?C.accent:C.red,borderRadius:3,height:"100%"}}/>
                  </div>
                  {sport==="NBA"&&<InjuryBadges teamName={n} injuries={injuries}/>}
                </div>)}
              </div>

              {/* Comparateur */}
              {g.sides.map(({side,teamName,prob,opb,best,be,bk})=>{
                const isV=be!==null&&be>0&&be>=minEdge;
                return <div key={side} style={{marginBottom:side==="home"?10:0,background:isV?C.accentDim:`${C.border}30`,border:`1px solid ${isV?C.accent+"50":C.border}`,borderRadius:7,overflow:"hidden"}}>
                  {/* Header équipe */}
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:`${C.border}40`,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:12}}>{teamName} <span style={{fontSize:9,color:C.muted,fontWeight:400}}>{side==="home"?"🏠":"✈️"}</span></span>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:10,color:C.muted}}>Modèle</span>
                      <span style={{fontFamily:"DM Mono",fontWeight:700,fontSize:13,color:prob>50?sc:C.dim}}>{prob}%</span>
                    </div>
                    {best&&best[1]>0&&<div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:9,color:C.muted}}>Best cote</div>
                        <span style={{fontFamily:"DM Mono",fontSize:14,fontWeight:700,color:C.yellow}}>{best[1].toFixed(2)}</span>
                        <span style={{fontSize:9,color:C.muted,marginLeft:3}}>({BOOKMAKERS.find(b=>b.id===best[0])?.short})</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:9,color:C.muted}}>Edge</div>
                        <span style={{fontFamily:"DM Mono",fontSize:13,fontWeight:700,color:be>0?C.accent:C.red}}>{be>0?"+":""}{be?.toFixed(1)}%</span>
                      </div>
                      {isV&&<div style={{background:C.accent,color:C.bg,borderRadius:5,padding:"4px 8px",textAlign:"center",fontWeight:800,fontSize:11}}>✦ VALUE<br/><span style={{fontFamily:"DM Mono"}}>{bk.toFixed(1)}€</span></div>}
                    </div>}
                  </div>
                  {/* Colonnes bookmakers */}
                  <div style={{display:"flex"}}>
                    {BOOKMAKERS.map((bk,bi)=>{
                      const val=opb[bk.id], isBest=best&&best[0]===bk.id&&val>0;
                      const implP=val>0?(100/val).toFixed(1):"—", ev=val>0?calcEdge(prob,val)*100:null;
                      return <div key={bk.id} style={{flex:1,padding:"8px 10px",borderLeft:bi>0?`1px solid ${C.border}`:"none",background:isBest?`${bk.color}18`:"transparent",borderTop:`2px solid ${isBest?bk.color:"transparent"}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
                          <div style={{width:20,height:20,borderRadius:3,background:bk.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:"#fff",flexShrink:0}}>{bk.short}</div>
                          <span style={{fontSize:10,fontWeight:600,color:isBest?C.text:C.dim}}>{bk.name}</span>
                          {isBest&&<Chip color={C.yellow} small>★</Chip>}
                        </div>
                        <input placeholder="Cote" type="number" step="0.01" min="1" inputMode="decimal"
                          value={bookOdds[`${g.gameKey}_${side}_${bk.id}`]||""}
                          onChange={ev=>so(g.gameKey,side,bk.id,ev.target.value)}
                          style={{width:"100%",background:C.bg,border:`1px solid ${isBest?bk.color:C.border}`,borderRadius:5,padding:"5px 7px",color:C.text,fontSize:13,fontFamily:"DM Mono",outline:"none",marginBottom:5}}/>

                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span>Impl.</span><span style={{fontFamily:"DM Mono",color:C.dim}}>{implP}%</span></div>
                          <div style={{display:"flex",justifyContent:"space-between"}}><span>Edge</span><span style={{fontFamily:"DM Mono",fontWeight:700,color:ev>0?C.accent:C.red}}>{ev>0?"+":""}{ev?.toFixed(1)}%</span></div>
                        </div>}
                      </div>;
                    })}
                  </div>
                </div>;
              })}
            </div>
          </Card>;
        })}
      </div>;
    }

    // ── CLASSEMENTS ───────────────────────────────────────────────────────────
    function Standings({nbaStandings, nbaLoading, nbaError, refetch, lastUpdate}) {
      const [sport, setSport] = useState("NBA");
      const db = [...(getDB(sport,nbaStandings)||[])].sort((a,b)=>b.winPct-a.winPct);
      const sc = SPORT_META[sport]?.color||C.accent;

      return <div className="fade" style={{display:"flex",flexDirection:"column",gap:14}}>

            <h2 style={{fontSize:20,fontWeight:800}}>Classements</h2>
            <p style={{fontSize:11,color:C.dim,marginTop:2}}>

            {sport==="NBA"&&<button onClick={refetch} style={{background:C.border,border:"none",borderRadius:5,padding:"4px 9px",fontSize:12,color:C.accent,cursor:"pointer"}}>↻</button>}

          <Card style={{padding:0,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:`${C.border}80`}}>
                {["#","Équipe",...(sport==="NBA"?["Conf."]:[]),"V","D","Win%"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>)}

                <td style={{padding:"8px 10px",color:i<3?sc:C.muted,fontFamily:"DM Mono",fontWeight:i<3?700:400,fontSize:11}}>{i+1}</td>
                <td style={{padding:"8px 10px",fontWeight:600,fontSize:12}}>{t.name}</td>
                {sport==="NBA"&&<td style={{padding:"8px 10px"}}><Chip color={t.conf==="EAST"?C.blue:C.yellow} small>{t.conf}</Chip></td>}
                <td style={{padding:"8px 10px",fontFamily:"DM Mono",color:C.accent,fontSize:11}}>{t.wins}</td>
                <td style={{padding:"8px 10px",fontFamily:"DM Mono",color:C.red,fontSize:11}}>{t.losses}</td>
                <td style={{padding:"8px 10px",fontFamily:"DM Mono",fontWeight:700,color:t.winPct>=0.5?sc:C.dim,fontSize:11}}>{(t.winPct*100).toFixed(1)}%</td>
              </tr>)}</tbody>
            </table>
          </Card>
        )}
      </div>;
    }

    // ── BANKROLL ──────────────────────────────────────────────────────────────
    function Bankroll({bankroll, setBankroll}) {
      const [odds,setOdds]=useState(1.85),[prob,setProb]=useState(58),[frac,setFrac]=useState(0.5),[method,setMethod]=useState("half"),[paths,setPaths]=useState([]);
      const b=odds-1,p=prob/100,kRaw=(b*p-(1-p))/b,kFull=Math.max(0,kRaw)*bankroll;
      const stake={full:kFull,half:kFull*frac,flat:bankroll*0.02}[method], e=kRaw*100;
      useEffect(()=>{
        setPaths(Array.from({length:8},()=>{let br=bankroll;return Array.from({length:30},()=>{br=Math.max(0,Math.random()<p?br+stake*b:br-stake);return br;});}));
      },[odds,prob,frac,method,bankroll]);
      const allV=paths.flat(),maxV=Math.max(...allV,bankroll*1.2),minV=Math.min(...allV,bankroll*0.5);

      return <div className="fade" style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><h2 style={{fontSize:20,fontWeight:800}}>Bankroll</h2><p style={{fontSize:11,color:C.dim,marginTop:2}}>Kelly · Monte Carlo</p></div>
        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:12}}>Paramètres</div>
          {[{l:`Bankroll : ${bankroll}€`,v:bankroll,min:100,max:5000,s:50,set:setBankroll},{l:`Cote : ${odds.toFixed(2)}`,v:odds,min:1.1,max:6,s:0.05,set:setOdds},{l:`Prob. : ${prob}%`,v:prob,min:30,max:80,s:1,set:setProb}].map(({l,v,min,max,s,set})=><div key={l} style={{marginBottom:10}}><div style={{fontSize:11,color:C.muted,marginBottom:3}}>{l}</div><input type="range" min={min} max={max} step={s} value={v} onChange={e=>set(parseFloat(e.target.value))} style={{width:"100%"}}/></div>)}
          <div style={{fontWeight:700,fontSize:12,margin:"10px 0 8px"}}>Stratégie</div>
          {[["full","Kelly complet"],["half",`½ Kelly ×${frac.toFixed(1)}`],["flat","Flat 2%"]].map(([k,l])=><button key={k} onClick={()=>setMethod(k)} style={{display:"block",width:"100%",marginBottom:5,textAlign:"left",background:method===k?C.accent:C.border,color:method===k?C.bg:C.text,border:"none",borderRadius:6,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>)}
          {method==="half"&&<div style={{marginTop:8}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Fraction : {(frac*100).toFixed(0)}%</div><input type="range" min={0.1} max={1} step={0.05} value={frac} onChange={e=>setFrac(parseFloat(e.target.value))} style={{width:"100%"}}/></div>}
        </Card>
        <div style={{display:"flex",gap:10}}>
          <Stat label="Mise Kelly" value={`${stake.toFixed(1)}€`} sub={`${((stake/bankroll)*100).toFixed(1)}%`}/>
          <Stat label="Edge" value={`${e.toFixed(1)}%`} sub={e>0?"Avantage":"⚠️ Négatif"} color={e>0?C.accent:C.red}/>
        </div>
        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>Monte Carlo · 30 paris</div>
          <svg viewBox="0 0 400 100" style={{width:"100%",height:100}} preserveAspectRatio="none">
            <line x1={0} y1={100-((bankroll-minV)/(maxV-minV))*100} x2={400} y2={100-((bankroll-minV)/(maxV-minV))*100} stroke={C.yellow} strokeWidth="1" strokeDasharray="4,3" opacity={0.5}/>
            {paths.map((path,pi)=>{const d=[bankroll,...path].map((v,i)=>`${i===0?"M":"L"}${(i/30)*400},${100-((v-minV)/(maxV-minV))*100}`).join(" ");return <path key={pi} d={d} fill="none" stroke={path[path.length-1]>=bankroll?C.accent:C.red} strokeWidth="1.5" opacity={0.55}/>;})}
          </svg>
          <div style={{fontSize:10,color:C.muted,marginTop:5}}>Jaune = bankroll initiale · Vert = profit · Rouge = perte</div>
        </Card>
      </div>;
    }

    // ── HISTORIQUE ────────────────────────────────────────────────────────────
    function Historique() {
      const [bets,setBets]=useState([
        {id:1,team:"LA Lakers",      match:"Warriors vs Lakers",   sport:"NBA",         book:"Winamax",date:"01 Mar",odds:2.10,stake:40,result:"win", profit:84},
        {id:2,team:"LA Clippers",    match:"Clippers vs Pelicans", sport:"NBA",         book:"Unibet", date:"02 Mar",odds:1.75,stake:30,result:"win", profit:22.5},
        {id:3,team:"OKC Thunder",    match:"Dallas vs OKC",        sport:"NBA",         book:"Winamax",date:"02 Mar",odds:1.55,stake:35,result:"win", profit:19.25},
        {id:4,team:"Raptors",        match:"Washington vs Raptors",sport:"NBA",         book:"Unibet", date:"01 Mar",odds:1.90,stake:25,result:"loss",profit:-25},
        {id:5,team:"Toulouse",       match:"Toulouse vs Racing 92",sport:"Rugby Top 14",book:"Winamax",date:"01 Mar",odds:1.45,stake:30,result:"win", profit:13.5},
        {id:6,team:"Tours VB",       match:"Tours VB vs Chaumont", sport:"Volleyball",  book:"Unibet", date:"28 Fév",odds:1.60,stake:20,result:"win", profit:12},
      ]);
      const [form,setForm]=useState({team:"",match:"",sport:"NBA",book:"Winamax",odds:"",stake:"",result:"win",date:""});
      const add=()=>{
        if(!form.team||!form.odds||!form.stake)return;
        const odds=+form.odds,stake=+form.stake;
        setBets(p=>[...p,{id:Date.now(),...form,odds,stake,profit:form.result==="win"?stake*(odds-1):-stake}]);
        setForm(f=>({...f,team:"",match:"",odds:"",stake:""}));
      };
      const tp=bets.reduce((s,b)=>s+b.profit,0),ts=bets.reduce((s,b)=>s+b.stake,0);
      const roi=ts>0?(tp/ts*100).toFixed(1):0,wins=bets.filter(b=>b.result==="win").length;

      return <div className="fade" style={{display:"flex",flexDirection:"column",gap:14}}>
        <h2 style={{fontSize:20,fontWeight:800}}>Historique</h2>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Stat label="P&L" value={`${tp>=0?"+":""}${tp.toFixed(0)}€`} color={tp>=0?C.accent:C.red}/>
          <Stat label="ROI" value={`${roi}%`} color={parseFloat(roi)>=0?C.accent:C.red} sub={`${ts}€`}/>
          <Stat label="Win Rate" value={`${bets.length?(wins/bets.length*100).toFixed(0):0}%`} color={C.yellow} sub={`${wins}/${bets.length}`}/>
        </div>
        <Card>
          <div style={{fontWeight:700,fontSize:12,marginBottom:10}}>Ajouter un pari</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <div style={{display:"flex",gap:7}}>
              <input placeholder="Équipe" value={form.team} onChange={e=>setForm(p=>({...p,team:e.target.value}))} style={{flex:2,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
              <input placeholder="Date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
            </div>
            <input placeholder="Match (ex: OKC vs Lakers)" value={form.match} onChange={e=>setForm(p=>({...p,match:e.target.value}))} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
            <div style={{display:"flex",gap:7}}>
              <input placeholder="Cote" type="number" inputMode="decimal" value={form.odds} onChange={e=>setForm(p=>({...p,odds:e.target.value}))} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
              <input placeholder="Mise €" type="number" inputMode="numeric" value={form.stake} onChange={e=>setForm(p=>({...p,stake:e.target.value}))} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,outline:"none"}}/>
            </div>
            <div style={{display:"flex",gap:7}}>
              <select value={form.sport} onChange={e=>setForm(p=>({...p,sport:e.target.value}))} style={{flex:1,background:C.border,border:"none",borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12}}>{SPORTS.map(s=><option key={s}>{s}</option>)}</select>
              <select value={form.book} onChange={e=>setForm(p=>({...p,book:e.target.value}))} style={{flex:1,background:C.border,border:"none",borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12}}>{BOOKMAKERS.map(b=><option key={b.id}>{b.name}</option>)}</select>
              <select value={form.result} onChange={e=>setForm(p=>({...p,result:e.target.value}))} style={{flex:1,background:C.border,border:"none",borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12}}><option value="win">Gagné</option><option value="loss">Perdu</option></select>
            </div>
            <button onClick={add} style={{background:C.accent,color:C.bg,border:"none",borderRadius:6,padding:"10px",fontSize:13,fontWeight:800,cursor:"pointer"}}>+ Ajouter</button>
          </div>
        </Card>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[...bets].reverse().map((b,i)=><Card key={b.id} style={{padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:14}}>{SPORT_META[b.sport]?.icon}</span>
                  <span style={{fontWeight:700,fontSize:13}}>{b.team}</span>
                  <Chip color={b.result==="win"?C.accent:C.red} small>{b.result==="win"?"✓":"✗"}</Chip>
                </div>
                <div style={{fontSize:11,color:C.muted}}>{b.match} · {b.book} · {b.date}</div>
                <div style={{fontSize:11,color:C.dim,marginTop:2}}>Cote {b.odds.toFixed(2)} · Mise {b.stake}€</div>
              </div>
              <span style={{fontFamily:"DM Mono",fontSize:15,fontWeight:800,color:b.profit>=0?C.accent:C.red}}>{b.profit>=0?"+":""}{b.profit.toFixed(1)}€</span>
            </div>
          </Card>)}
        </div>
      </div>;
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [tab,setTab]=useState(0);
      const [bankroll,setBankroll]=useState(1000);
      const {standings:nbaStandings, games:nbaGames, injuries, loading, error, refetch, lastUpdate} = useNBAData();

      const bets = [
        {id:1,team:"LA Lakers",      match:"Warriors vs Lakers",   sport:"NBA",         book:"Winamax",date:"01 Mar",odds:2.10,stake:40,result:"win", profit:84},
        {id:2,team:"LA Clippers",    match:"Clippers vs Pelicans", sport:"NBA",         book:"Unibet", date:"02 Mar",odds:1.75,stake:30,result:"win", profit:22.5},
        {id:3,team:"OKC Thunder",    match:"Dallas vs OKC",        sport:"NBA",         book:"Winamax",date:"02 Mar",odds:1.55,stake:35,result:"win", profit:19.25},
        {id:4,team:"Raptors",        match:"Washington vs Raptors",sport:"NBA",         book:"Unibet", date:"01 Mar",odds:1.90,stake:25,result:"loss",profit:-25},
        {id:5,team:"Toulouse",       match:"Toulouse vs Racing 92",sport:"Rugby Top 14",book:"Winamax",date:"01 Mar",odds:1.45,stake:30,result:"win", profit:13.5},
        {id:6,team:"Tours VB",       match:"Tours VB vs Chaumont", sport:"Volleyball",  book:"Unibet", date:"28 Fév",odds:1.60,stake:20,result:"win", profit:12},
      ];

      return <>
        {/* Header sticky */}
        <div style={{position:"sticky",top:0,zIndex:50,background:C.card,borderBottom:`1px solid ${C.border}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontFamily:"DM Mono",fontWeight:700,fontSize:16,color:C.accent}}>◈ BetEdge</span>
            <span style={{fontSize:9,color:C.muted}}>🏀🏉🏐</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <LiveBadge loading={loading} error={error} lastUpdate={lastUpdate} refetch={refetch}/>
            <span style={{fontFamily:"DM Mono",fontSize:14,fontWeight:700,color:C.accent}}>{bankroll}€</span>
          </div>
        </div>

        {/* Desktop nav */}
        <div className="desktop-nav" style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 20px"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?C.accent:"transparent"}`,color:tab===t.id?C.accent:C.dim,padding:"10px 14px",fontSize:12,fontWeight:tab===t.id?700:500,cursor:"pointer"}}>{t.icon} {t.label}</button>)}
        </div>

        {/* Content */}
        <div className="content-wrap" style={{padding:"16px 16px 0"}}>
          {tab===0&&<Dashboard bets={bets} bankroll={bankroll} loading={loading} error={error} lastUpdate={lastUpdate} refetch={refetch}/>}
          {tab===1&&<Predictions bankroll={bankroll} nbaStandings={nbaStandings} nbaGames={nbaGames} nbaLoading={loading} nbaError={error} refetch={refetch} injuries={injuries}/>}
          {tab===2&&<Standings nbaStandings={nbaStandings} nbaLoading={loading} nbaError={error} refetch={refetch} lastUpdate={lastUpdate}/>}
          {tab===3&&<Bankroll bankroll={bankroll} setBankroll={setBankroll}/>}
          {tab===4&&<Historique/>}
        </div>

        {/* Bottom nav mobile */}
        <nav className="bottom-nav">
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={tab===t.id?"active":""}>
            <span className="nav-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>)}
        </nav>
      </>;
    }

    // Enregistrement Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
