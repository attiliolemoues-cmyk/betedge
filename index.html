// ─── MODÈLE ───────────────────────────────────────────────────────────────────
function nrToStr(nr){return Math.max(.05,Math.min(.95,(nr+15)/30))}
function injDelta(team,injuries){
  return Math.max(-.25,(injuries[team]||[]).reduce((s,inj)=>{
    if(inj.status==='rest')return s+INJURY_IMPACT.rest;
    if(inj.status==='questionable')return s+INJURY_IMPACT.questionable;
    return s+(INJURY_IMPACT['out_'+(inj.tier||'rotation')]||INJURY_IMPACT.out_rotation);
  },0));
}
function getTeam(name,db){return db.find(t=>t.name===name)||{wins:'—',losses:'—',winPct:.5,netRating:0,offRating:0,defRating:0,intNatPct:0}}
function getDB(sport,nbaS){
  if(sport==='NBA')return nbaS;
  if(sport==='Rugby Top 14')return RUGBY_TOP14;
  if(sport==='6 Nations')return SIX_NATIONS;
  return VOLLEY;
}
function computeProb(home,away,sport,nbaS,injuries,flags,intWeek){
  const db=getDB(sport,nbaS);
  const h=getTeam(home,db),a=getTeam(away,db);
  let hS=sport==='NBA'?nrToStr(h.netRating||0):h.winPct;
  let aS=sport==='NBA'?nrToStr(a.netRating||0):a.winPct;
  if(sport==='NBA'){hS+=injDelta(home,injuries);aS+=injDelta(away,injuries);if(flags.homeB2B)hS-=.05;if(flags.awayB2B)aS-=.05;}
  const hID=(sport!=='NBA'&&intWeek&&sport!=='6 Nations')?-.06*(h.intNatPct||0):0;
  const aID=(sport!=='NBA'&&intWeek&&sport!=='6 Nations')?-.06*(a.intNatPct||0):0;
  hS=Math.max(.05,Math.min(.95,hS+hID));aS=Math.max(.05,Math.min(.95,aS+aID));
  const ha=sport==='NBA'?.035:.05;
  const raw=(hS+ha)/((hS+ha)+aS);
  const prob=.5+(raw-.5)*.75;
  return{home:Math.round(prob*1000)/10,away:Math.round((1-prob)*1000)/10,hID,aID};
}
function calcEdge(p,o){return p/100-1/o}
function kelly(br,p,o){const b=o-1,pp=p/100;return Math.max(0,(b*pp-(1-pp))/b)*br}
function bestOdds(obj){const en=Object.entries(obj).filter(([,v])=>v>0);return en.length?en.reduce((b,c)=>c[1]>b[1]?c:b):null}

const BDL = 'https://api.balldontlie.io/nba/v1';
const MONTH_FR = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
function fmtDate(d){const dt=new Date(d);return dt.getDate()+' '+MONTH_FR[dt.getMonth()];}
function toISO(d){return d.toISOString().split('T')[0];}

// Classify player tier from position/description
function guessTier(desc){
  const d=(desc||'').toLowerCase();
  if(d.includes('star')||d.includes('mvp')||d.includes('all-nba first'))return 'star';
  if(d.includes('all-star')||d.includes('all-nba'))return 'allstar';
  return 'rotation';
}
function guessStatus(s){
  const v=(s||'').toLowerCase();
  if(v.includes('out'))return 'out';
  if(v.includes('rest'))return 'rest';
  return 'questionable';
}

function useNBAData(bdlKey){
  const [standings,setStandings]=useState(NBA_FALLBACK);
  const [games,setGames]=useState([]);
  const [injuries,setInjuries]=useState({});
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [injLoading,setInjLoading]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);

  const fetchData=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const bdlHeaders = bdlKey ? {Authorization: 'Bearer '+bdlKey} : {};

      // ── Standings (balldontlie) ────────────────────────────────────────────
      const sRes=await fetch(BDL+'/standings?season=2025&per_page=30', {headers: bdlHeaders});
      if(!sRes.ok)throw new Error('Standings HTTP '+sRes.status);
      const sData=await sRes.json();
      const rows=sData.data||[];
      if(!rows.length)throw new Error('Standings vides');
      const mapped=rows.map(t=>({
        name: t.team?.full_name || t.team?.name || '?',
        wins: t.wins||0,
        losses: t.losses||0,
        winPct: (t.wins+t.losses)>0 ? t.wins/(t.wins+t.losses) : 0,
        conf: (t.conference||t.team?.conference||'').toLowerCase().startsWith('e') ? 'EAST' : 'WEST',
        netRating:0, offRating:0, defRating:0,
      })).sort((a,b)=>b.winPct-a.winPct);
      setStandings(mapped);

      // ── Games 7 prochains jours (balldontlie) ─────────────────────────────
      const today=new Date();
      const end=new Date(today);end.setDate(end.getDate()+7);
      // Construire les dates intermédiaires
      const dates=[];
      for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
        dates.push('dates[]='+toISO(new Date(d)));
      }
      const gRes=await fetch(BDL+'/games?'+dates.join('&')+'&per_page=30', {headers: bdlHeaders});
      if(!gRes.ok)throw new Error('Games HTTP '+gRes.status);
      const gData=await gRes.json();
      const upcoming=(gData.data||[])
        .filter(g=>!g.period||g.period===0) // pas encore commencé
        .slice(0,8)
        .map(g=>({
          home:g.home_team.full_name,
          away:g.visitor_team.full_name,
          date:fmtDate(g.date),
          league:'NBA',homeB2B:false,awayB2B:false,apiProb:null,
        }));
      setGames(upcoming);
      setLastUpdate(new Date());

      // ── Injuries (balldontlie, même clé) ──────────────────────────────────
      if(bdlKey){
        setInjLoading(true);
        try{
          const iRes=await fetch(BDL+'/player_injuries?per_page=100', {headers: bdlHeaders});
          if(!iRes.ok)throw new Error('Injuries HTTP '+iRes.status);
          const iData=await iRes.json();
          const inj={};
          (iData.data||[]).forEach(item=>{
            const team=item.team?.full_name;
            const player=(item.player?.first_name||'')+' '+(item.player?.last_name||'');
            const s=(item.status||'').toLowerCase();
            const status=s.includes('out')?'out':s.includes('rest')?'rest':'questionable';
            const tier='rotation'; // balldontlie ne fournit pas le tier
            if(!team)return;
            if(!inj[team])inj[team]=[];
            inj[team].push({player:player.trim(),status,tier,reason:item.type||item.status||''});
          });
          setInjuries(inj);
        }catch(ie){
          console.warn('Injuries failed:',ie.message);
        }finally{setInjLoading(false);}
      }else{
        setInjuries({});
      }
    }catch(err){
      setError(err.message);
      setStandings(NBA_FALLBACK);
      setGames([]);
      setLastUpdate(new Date());
    }finally{setLoading(false);}
  },[bdlKey]);

  useEffect(()=>{
    fetchData();
    const t=setInterval(fetchData,15*60*1000);
    return()=>clearInterval(t);
  },[fetchData]);
  return{standings,games,injuries,injLoading,loading,error,refetch:fetchData,lastUpdate};
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({bets,bankroll,loading,error,lastUpdate,refetch}){
  const tp=bets.reduce((s,b)=>s+b.profit,0),ts=bets.reduce((s,b)=>s+b.stake,0);

  const roi=ts>0?((tp/ts)*100).toFixed(1):'0.0';
  const cumul=bets.reduce((acc,b)=>{acc.push((acc[acc.length-1]||0)+b.profit);return acc;},[0]);
  const last=cumul[cumul.length-1]||0;
  const W=400,H=80,minV=Math.min(...cumul,-5),maxV=Math.max(...cumul,5);
  const pts=cumul.map((v,i)=>`${(i/(cumul.length-1||1))*W},${H-((v-minV)/(maxV-minV))*H}`).join(' ');

      e('div',{style:{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}},

    e('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
      stat('Bankroll',bankroll+'€','Capital'),
      stat('P&L',(last>=0?'+':'')+last.toFixed(0)+'€','Net',last>=0?C.accent:C.red),
      stat('ROI',roi+'%',ts+'€ misés',parseFloat(roi)>=0?C.accent:C.red),
      stat('Win Rate',(bets.length?(wins/bets.length*100).toFixed(0):0)+'%',wins+'/'+bets.length,C.yellow),
    ),
    card([
      e('div',{key:'t',style:{fontWeight:700,fontSize:12,marginBottom:8}},'Courbe P&L'),
      e('svg',{key:'s',viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:H},preserveAspectRatio:'none'},
        e('line',{x1:0,y1:H-((0-minV)/(maxV-minV))*H,x2:W,y2:H-((0-minV)/(maxV-minV))*H,stroke:C.yellow,strokeWidth:1,strokeDasharray:'4,3',opacity:.5}),
        e('polyline',{fill:'none',stroke:last>=0?C.accent:C.red,strokeWidth:2,points:pts}),
        ...cumul.map((v,i)=>e('circle',{key:i,cx:(i/(cumul.length-1||1))*W,cy:H-((v-minV)/(maxV-minV))*H,r:2.5,fill:last>=0?C.accent:C.red}))
      )
    ]),
    card([
      e('div',{key:'t',style:{fontWeight:700,fontSize:12,marginBottom:10}},'Derniers paris'),
      ...[...bets].reverse().slice(0,5).map(b=>
        e('div',{key:b.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid '+C.border}},
          e('div',{style:{display:'flex',gap:8,alignItems:'center'}},

function Bankroll({bankroll,setBankroll}){
  const [odds,setOdds]=useState(1.85),[prob,setProb]=useState(58),[frac,setFrac]=useState(.5),[method,setMethod]=useState('half');
  const [paths,setPaths]=useState([]);
  const b=odds-1,p=prob/100,kRaw=(b*p-(1-p))/b,kFull=Math.max(0,kRaw)*bankroll;
  const stake={full:kFull,half:kFull*frac,flat:bankroll*.02}[method],edgeV=kRaw*100;

  useEffect(()=>{
    setPaths(Array.from({length:8},()=>{let br=bankroll;return Array.from({length:30},()=>{br=Math.max(0,Math.random()<p?br+stake*b:br-stake);return br;});}));
  },[odds,prob,frac,method,bankroll,stake,b,p]);

  const allV=paths.flat(),maxV=Math.max(...allV,bankroll*1.2)||1,minV=Math.min(...allV,bankroll*.5)||0;

  return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
    e('div',null,e('h2',{style:{fontSize:20,fontWeight:800}},'Bankroll'),e('p',{style:{fontSize:11,color:C.dim,marginTop:2}},'Kelly · Monte Carlo')),
    card([
      e('div',{key:'t',style:{fontWeight:700,fontSize:12,marginBottom:12}},'Paramètres'),
      ...[{l:'Bankroll : '+bankroll+'€',v:bankroll,min:100,max:5000,s:50,set:setBankroll},{l:'Cote : '+odds.toFixed(2),v:odds,min:1.1,max:6,s:.05,set:setOdds},{l:'Prob. : '+prob+'%',v:prob,min:30,max:80,s:1,set:setProb}].map(({l,v,min,max,s,set})=>
        e('div',{key:l,style:{marginBottom:10}},e('div',{style:{fontSize:11,color:C.muted,marginBottom:3}},l),e('input',{type:'range',min,max,step:s,value:v,onChange:ev=>set(parseFloat(ev.target.value))}))
      ),
      e('div',{key:'st',style:{fontWeight:700,fontSize:12,margin:'10px 0 8px'}},'Stratégie'),
      ...[['full','Kelly complet'],['half','½ Kelly ×'+frac.toFixed(1)],['flat','Flat 2%']].map(([k,l])=>
        e('button',{key:k,onClick:()=>setMethod(k),style:{display:'block',width:'100%',marginBottom:5,textAlign:'left',background:method===k?C.accent:C.border,color:method===k?C.bg:C.text,border:'none',borderRadius:6,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}},l)
      ),
      method==='half'&&e('div',{key:'frac',style:{marginTop:8}},e('div',{style:{fontSize:10,color:C.muted,marginBottom:3}},'Fraction : '+(frac*100).toFixed(0)+'%'),e('input',{type:'range',min:.1,max:1,step:.05,value:frac,onChange:ev=>setFrac(parseFloat(ev.target.value))}))
    ]),
    e('div',{style:{display:'flex',gap:10}},stat('Mise Kelly',stake.toFixed(1)+'€',((stake/bankroll)*100).toFixed(1)+'%'),stat('Edge',edgeV.toFixed(1)+'%',edgeV>0?'Avantage':'⚠️ Négatif',edgeV>0?C.accent:C.red)),
    card([
      e('div',{key:'t',style:{fontWeight:700,fontSize:12,marginBottom:8}},'Monte Carlo · 30 paris'),
      e('svg',{key:'s',viewBox:'0 0 400 100',style:{width:'100%',height:100},preserveAspectRatio:'none'},
        e('line',{x1:0,y1:100-((bankroll-minV)/(maxV-minV))*100,x2:400,y2:100-((bankroll-minV)/(maxV-minV))*100,stroke:C.yellow,strokeWidth:1,strokeDasharray:'4,3',opacity:.5}),
        ...paths.map((path,pi)=>{
          const d=[bankroll,...path].map((v,i)=>(i===0?'M':'L')+(i/30)*400+','+(100-((v-minV)/(maxV-minV))*100)).join(' ');
          return e('path',{key:pi,d,fill:'none',stroke:path[path.length-1]>=bankroll?C.accent:C.red,strokeWidth:1.5,opacity:.55});
        })
      ),
      e('div',{key:'leg',style:{fontSize:10,color:C.muted,marginTop:5}},'Jaune = bankroll initiale · Vert = profit · Rouge = perte')
    ])
  );
}

// ─── HISTORIQUE ───────────────────────────────────────────────────────────────
function Historique(){
  const [bets,setBets]=useState([
    {id:1,team:'LA Lakers',     match:'Warriors vs Lakers',   sport:'NBA',         book:'Winamax',date:'01 Mar',odds:2.10,stake:40, result:'win', profit:84},
    {id:2,team:'LA Clippers',   match:'Clippers vs Pelicans', sport:'NBA',         book:'Unibet', date:'02 Mar',odds:1.75,stake:30, result:'win', profit:22.5},
    {id:3,team:'OKC Thunder',   match:'Dallas vs OKC',        sport:'NBA',         book:'Winamax',date:'02 Mar',odds:1.55,stake:35, result:'win', profit:19.25},
    {id:4,team:'Raptors',       match:'Washington vs Raptors',sport:'NBA',         book:'Unibet', date:'01 Mar',odds:1.90,stake:25, result:'loss',profit:-25},
    {id:5,team:'Toulouse',      match:'Toulouse vs Racing 92',sport:'Rugby Top 14',book:'Winamax',date:'01 Mar',odds:1.45,stake:30, result:'win', profit:13.5},
    {id:6,team:'Tours VB',      match:'Tours VB vs Chaumont', sport:'Volleyball',  book:'Unibet', date:'28 Fév',odds:1.60,stake:20, result:'win', profit:12},
  ]);
  const [form,setForm]=useState({team:'',match:'',sport:'NBA',book:'Winamax',odds:'',stake:'',result:'win',date:''});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const add=()=>{
    if(!form.team||!form.odds||!form.stake)return;
    const odds=+form.odds,stake=+form.stake;
    setBets(p=>[...p,{id:Date.now(),...form,odds,stake,profit:form.result==='win'?stake*(odds-1):-stake}]);
    upd('team','');upd('match','');upd('odds','');upd('stake','');
  };
  const tp=bets.reduce((s,b)=>s+b.profit,0),ts=bets.reduce((s,b)=>s+b.stake,0);
  const wins=bets.filter(b=>b.result==='win').length;

  return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
    e('h2',{style:{fontSize:20,fontWeight:800}},'Historique'),
    e('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
      stat('P&L',(tp>=0?'+':'')+tp.toFixed(0)+'€',null,tp>=0?C.accent:C.red),
      stat('ROI',ts>0?((tp/ts)*100).toFixed(1)+'%':'—',ts+'€ misés',tp>=0?C.accent:C.red),
      stat('Win Rate',(bets.length?(wins/bets.length*100).toFixed(0):0)+'%',wins+'/'+bets.length,C.yellow)
    ),
    card([
      e('div',{key:'t',style:{fontWeight:700,fontSize:12,marginBottom:10}},'Ajouter un pari'),
      e('div',{key:'f',style:{display:'flex',flexDirection:'column',gap:7}},
        e('div',{style:{display:'flex',gap:7}},
          e('input',{placeholder:'Équipe',value:form.team,onChange:ev=>upd('team',ev.target.value),style:{flex:2,background:C.bg,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,outline:'none'}}),
          e('input',{placeholder:'Date',value:form.date,onChange:ev=>upd('date',ev.target.value),style:{flex:1,background:C.bg,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,outline:'none'}})
        ),
        e('input',{placeholder:'Match (ex: OKC vs Lakers)',value:form.match,onChange:ev=>upd('match',ev.target.value),style:{background:C.bg,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,outline:'none'}}),
        e('div',{style:{display:'flex',gap:7}},
          e('input',{placeholder:'Cote',type:'number',inputMode:'decimal',value:form.odds,onChange:ev=>upd('odds',ev.target.value),style:{flex:1,background:C.bg,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,outline:'none'}}),
          e('input',{placeholder:'Mise €',type:'number',inputMode:'numeric',value:form.stake,onChange:ev=>upd('stake',ev.target.value),style:{flex:1,background:C.bg,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,outline:'none'}})
        ),
        e('div',{style:{display:'flex',gap:7}},
          e('select',{value:form.sport,onChange:ev=>upd('sport',ev.target.value),style:{flex:1,background:C.border,border:'none',borderRadius:6,padding:'8px 10px',color:C.text,fontSize:12}},
            ...SPORTS.map(s=>e('option',{key:s,value:s},s))
          ),
          e('select',{value:form.book,onChange:ev=>upd('book',ev.target.value),style:{flex:1,background:C.border,border:'none',borderRadius:6,padding:'8px 10px',color:C.text,fontSize:12}},
            ...BOOKS.map(b=>e('option',{key:b.id,value:b.name},b.name))
          ),
          e('select',{value:form.result,onChange:ev=>upd('result',ev.target.value),style:{flex:1,background:C.border,border:'none',borderRadius:6,padding:'8px 10px',color:C.text,fontSize:12}},
            e('option',{value:'win'},'Gagné'),e('option',{value:'loss'},'Perdu')
          )
        ),
        e('button',{onClick:add,style:{background:C.accent,color:C.bg,border:'none',borderRadius:6,padding:10,fontSize:13,fontWeight:800,cursor:'pointer'}},'+ Ajouter')
      )
    ]),
    ...[...bets].reverse().map(b=>
      card(e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        e('div',{style:{flex:1}},
          e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},
            e('span',{style:{fontSize:14}},SPORT_META[b.sport]?.icon),
            e('span',{style:{fontWeight:700,fontSize:13}},b.team),
            chip(b.result==='win'?'✓ Gagné':'✗ Perdu',b.result==='win'?C.accent:C.red,true)
          ),
          e('div',{style:{fontSize:11,color:C.muted}},b.match+' · '+b.book+' · '+b.date),
          e('div',{style:{fontSize:11,color:C.dim,marginTop:2}},'Cote '+b.odds.toFixed(2)+' · Mise '+b.stake+'€')
        ),
        e('span',{className:'mono',style:{fontSize:15,fontWeight:800,color:b.profit>=0?C.accent:C.red}},(b.profit>=0?'+':'')+b.profit.toFixed(1)+'€')
      ),{padding:'10px 12px'})
    )
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const TABS=[{id:0,label:'Dashboard',icon:'🏠'},{id:1,label:'Prédictions',icon:'🔮'},{id:2,label:'Classements',icon:'📊'},{id:3,label:'Bankroll',icon:'💰'},{id:4,label:'Historique',icon:'📋'}];

function App(){
  const [tab,setTab]=useState(0);
  const [bankroll,setBankroll]=useState(1000);
  const [bdlKey,setBdlKey]=useState(()=>localStorage.getItem('betedge_bdlkey'));
  const [rapidKey]=useState(''); // conservé pour le badge injuries
  const {standings:nbaS,games:nbaGames,injuries,injLoading,loading,error,refetch,lastUpdate}=useNBAData(bdlKey||'');

  // Premier lancement : setup
  if(bdlKey===null){
    return e(SetupScreen,{onDone:b=>{setBdlKey(b);}});
  }

  const bets=[
    {id:1,team:'LA Lakers',     match:'Warriors vs Lakers',   sport:'NBA',         book:'Winamax',date:'01 Mar',odds:2.10,stake:40, result:'win', profit:84},
    {id:2,team:'LA Clippers',   match:'Clippers vs Pelicans', sport:'NBA',         book:'Unibet', date:'02 Mar',odds:1.75,stake:30, result:'win', profit:22.5},
    {id:3,team:'OKC Thunder',   match:'Dallas vs OKC',        sport:'NBA',         book:'Winamax',date:'02 Mar',odds:1.55,stake:35, result:'win', profit:19.25},
    {id:4,team:'Raptors',       match:'Washington vs Raptors',sport:'NBA',         book:'Unibet', date:'01 Mar',odds:1.90,stake:25, result:'loss',profit:-25},
    {id:5,team:'Toulouse',      match:'Toulouse vs Racing 92',sport:'Rugby Top 14',book:'Winamax',date:'01 Mar',odds:1.45,stake:30, result:'win', profit:13.5},
    {id:6,team:'Tours VB',      match:'Tours VB vs Chaumont', sport:'Volleyball',  book:'Unibet', date:'28 Fév',odds:1.60,stake:20, result:'win', profit:12},
  ];

  return e(Fragment,null,
    // Header
    e('div',{style:{position:'sticky',top:0,zIndex:50,background:C.card,borderBottom:'1px solid '+C.border,padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:8}},
        e('span',{className:'mono',style:{fontWeight:700,fontSize:16,color:C.accent}},'◈ BetEdge'),
        e('span',{style:{fontSize:9,color:C.muted}},'🏀🏉🏐')
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
        liveBadge(loading,error,lastUpdate,refetch),
        e('button',{onClick:()=>{localStorage.removeItem('betedge_bdlkey');localStorage.removeItem('betedge_rapidkey');setBdlKey(null);},style:{background:C.border,border:'none',borderRadius:5,padding:'3px 8px',color:C.muted,cursor:'pointer',fontSize:10}},'⚙️'),
        e('span',{className:'mono',style:{fontSize:14,fontWeight:700,color:C.accent}},bankroll+'€')
      )
    ),
    // Content
    e('div',{style:{padding:'16px 16px 90px',maxWidth:1050,margin:'0 auto'}},
      tab===0&&e(Dashboard,{bets,bankroll,loading,error,lastUpdate,refetch}),
      tab===1&&e(Predictions,{bankroll,nbaS,nbaGames,loading,error,refetch,injuries,injLoading}),
      tab===2&&e(Standings,{nbaS,loading,error,refetch,lastUpdate}),
      tab===3&&e(Bankroll,{bankroll,setBankroll}),
      tab===4&&e(Historique)
    ),
    // Bottom nav
    e('nav',{className:'bottom-nav'},
      ...TABS.map(t=>e('button',{key:t.id,onClick:()=>setTab(t.id),className:tab===t.id?'active':''},
        e('span',{className:'nav-icon'},t.icon),
        e('span',null,t.label)
      ))
    )
  );
}

// Mount
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
